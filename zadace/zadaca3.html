<style>
body {
    margin: 0;

    background-color:#2e5b87 ;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background-color: #15293d;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

/* NAV */
nav label {
    margin-left: 20px;
    cursor: pointer;
    font-weight: bold;
}

nav label:hover {
    color: #2e64b2;
}

/* HIDE RADIO */
input[type="radio"] {
    display: none;
}

/* SECTIONS */
.section {
    display: none;
    padding: 30px;
}

/* SHOW ACTIVE */
#filmovi:checked ~ .content #filmovi-section,
#serije:checked ~ .content #serije-section,
#dokumentarci:checked ~ .content #dokumentarci-section {
    display: block;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
    flex-wrap: wrap;
}

.card {
    background: #6b6867;
    padding: 10px;
    border-radius: 10px;
    border: 2px dashed #2e5b87;
    text-align: center;
    height:400px;
    
}

.card img {
    width: 100%;
    border-radius: 8px;
    height:400px;
    width:300px;
}
</style>

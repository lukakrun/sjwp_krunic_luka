        body {

            color: white;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #15293d;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        /* NAV */
        nav a {
            margin-left: 20px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover {
            color: #2e64b2;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            padding: 30px;
        }

        .card {
            background: #6b6867;
            padding: 10px;
            border-radius: 10px;
            border: 2px dashed #2e5b87;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .card img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }
    </style>
</head>

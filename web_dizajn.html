

<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Interaktivna kućica</title>
<style>
  .house {
    width: 200px;
    height: 150px;
    background-color: orange;
    margin: 100px auto;
    position: relative;
    cursor: pointer;
  }

  .roof {
    position: absolute;
    top: -100px;
    left: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 100px solid red;
  }
  .circle{
position: absolute;
top: 10px;
border-radius: 50%;
color: green;
  }
</style>
</head>
<body>

<div class="house" onclick="promijeniBoju()">
  <div class="roof"></div>
</div>

<script>
function promijeniBoju() {
  const kuca = document.querySelector('.house');
  kuca.style.backgroundColor =
    kuca.style.backgroundColor === 'blue' ? 'orange' : 'blue';
}
</script>
<script>d3.selectall('p').style('color','red').style('font-size','40px');
</script>
</body>
</html>
